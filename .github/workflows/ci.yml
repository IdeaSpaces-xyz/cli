name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      # `npm run bundle` consumes dist/main.js, which `tsc --noEmit` above
      # doesn't produce. Run the emit-full build first so esbuild has
      # something to consume.
      - name: Build
        run: npm run build

      - name: Bundle
        run: npm run bundle

      - name: Verify bundle runs
        run: node bundle/ideaspaces.js --help
