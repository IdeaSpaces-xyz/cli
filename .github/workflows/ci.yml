name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck, test, bundle
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # @ideaspaces/sdk is a public dep, but package-lock pins it as
      # git+ssh://git@github.com/... and the CI runner has no SSH key. Rewrite
      # that to anonymous HTTPS, which works now that the SDK repo is public.
      # No token needed.
      - name: Force HTTPS for GitHub git fetch
        run: git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      # `npm run bundle` consumes dist/main.js, which `tsc --noEmit` above
      # doesn't produce. Run the emit-full build first so esbuild has
      # something to consume.
      - name: Build
        run: npm run build

      - name: Bundle
        run: npm run bundle

      - name: Verify bundle runs
        run: node bundle/ideaspaces.js --help
