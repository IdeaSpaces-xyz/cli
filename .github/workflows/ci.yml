name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck, test, bundle
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # The @ideaspaces/sdk dependency points at a private GitHub repo. On
      # hosted runners, npm resolves the git+https:// URL as ssh:// (the
      # runner's default insteadOf rule) and fails because no SSH key is
      # loaded. Force HTTPS with a token that has read access to
      # IdeaSpaces-xyz/sdk. Requires SDK_FETCH_TOKEN secret configured at
      # the repo level (fine-grained PAT or classic PAT with `repo` scope).
      - name: Configure git auth for private SDK fetch
        run: |
          if [ -z "${{ secrets.SDK_FETCH_TOKEN }}" ]; then
            echo "::error::SDK_FETCH_TOKEN secret is not configured."
            exit 1
          fi
          git config --global url."https://x-access-token:${{ secrets.SDK_FETCH_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git config --global url."https://x-access-token:${{ secrets.SDK_FETCH_TOKEN }}@github.com/".insteadOf "ssh://git@github.com/"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      # `npm run bundle` consumes dist/main.js, which `tsc --noEmit` above
      # doesn't produce. Run the emit-full build first so esbuild has
      # something to consume.
      - name: Build
        run: npm run build

      - name: Bundle
        run: npm run bundle

      - name: Verify bundle runs
        run: node bundle/ideaspaces.js --help
